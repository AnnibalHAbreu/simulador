# =============================================================================
# ETAPA 1 — LOOPBACK: Teste de comunicação Modbus RTU
# =============================================================================
# Neste modo:
#   - O medidor (slave 100) responde FC03 com valores FIXOS e conhecidos
#   - Os inversores aceitam FC16 e logam os setpoints recebidos
#   - A simulação física está DESLIGADA (sem Thévenin, ZIP, dinâmica)
#   - Objetivo: validar que COM1 e COM2 funcionam, slave IDs respondem,
#     endereçamento 0x0099 está correto, e o PLC lê/escreve sem erros
#
# VALORES ESPERADOS NO MEDIDOR (para conferência no PLC):
#   PF (fases A/B/C):  0.92  → registrador U16 = 15073 (0.92 × 16384)
#   I  (fases A/B/C):  5.0 A → registrador U16 = 1280  (5.0 × 256)
#   V  (fases A/B/C):  7967 V → registrador U16 = 1019776 → overflow U16!
#                       Ajustado para 62.24 V (7967/RTP com RTP=128 interno)
#
# COMO AVANÇAR PARA ETAPA 2:
#   Mude "mode: loopback" para "mode: full" e reinicie o simulador.
# =============================================================================

simulation:
  mode: "loopback"        # ← ETAPA 1: apenas Modbus, sem simulação
  tick_s: 0.01
  control_cycle_s: 2.0
  v_ll_v: 380.0
  enable_logs: true

  # Valores fixos do medidor no modo loopback
  # (escolha valores que facilitem a verificação no PLC)
  loopback_pf: 0.92          # PF das 3 fases (positivo = indutivo)
  loopback_v_mt_ln_v: 7967.0 # tensão fase-neutro MT (13800/√3 ≈ 7967 V)
  loopback_i_mt_a: 5.0       # corrente MT (A)

  # Campos abaixo são ignorados no modo loopback, mas mantidos para
  # facilitar a transição para mode: full (basta mudar 1 linha)
  u_default: 1.0
  load_p_kw: 50.0
  load_q_kvar: 0.0

  zip_p_Z: 0.50
  zip_p_I: 0.00
  zip_p_P: 0.50
  zip_q_Z: 0.00
  zip_q_I: 0.00
  zip_q_P: 1.00

  thevenin_vth_ll_v: 380.0
  thevenin_r_ohm: 0.00283
  thevenin_x_ohm: 0.01416

  v_mt_ll_v: 13800.0
  rtp: 120.0
  rtc: 200.0

  events_file: "configs/events.json"
  events_poll_s: 2.0

com1:
  serial:
    device: "/dev/ttySC0"
    baudrate: 9600
    parity: "N"
    stopbits: 1
    bytesize: 8
    timeout_s: 0.2

  meter:
    slave_id: 100
    base_address: 0x0099
    quantity_u16: 28

  inverters:
    - { slave_id: 101, p_nom_kw: 60, s_nom_kva: 60, tau_p_s: 1.0, tau_q_s: 1.0 }
    - { slave_id: 102, p_nom_kw: 60, s_nom_kva: 60, tau_p_s: 1.0, tau_q_s: 1.0 }
    - { slave_id: 103, p_nom_kw: 35, s_nom_kva: 35, tau_p_s: 1.0, tau_q_s: 1.0 }
    - { slave_id: 104, p_nom_kw: 15, s_nom_kva: 15, tau_p_s: 1.0, tau_q_s: 1.0 }
    - { slave_id: 105, p_nom_kw: 15, s_nom_kva: 15, tau_p_s: 1.0, tau_q_s: 1.0 }
    - { slave_id: 106, p_nom_kw: 15, s_nom_kva: 15, tau_p_s: 1.0, tau_q_s: 1.0 }
    - { slave_id: 107, p_nom_kw: 15, s_nom_kva: 15, tau_p_s: 1.0, tau_q_s: 1.0 }
    - { slave_id: 108, p_nom_kw: 15, s_nom_kva: 15, tau_p_s: 1.0, tau_q_s: 1.0 }
    - { slave_id: 109, p_nom_kw: 15, s_nom_kva: 15, tau_p_s: 1.0, tau_q_s: 1.0 }

com2:
  serial:
    device: "/dev/ttySC1"
    baudrate: 9600
    parity: "N"
    stopbits: 1
    bytesize: 8
    timeout_s: 0.2

  inverters:
    - { slave_id: 201, p_nom_kw: 15, s_nom_kva: 15, tau_p_s: 1.0, tau_q_s: 1.0 }
    - { slave_id: 202, p_nom_kw: 15, s_nom_kva: 15, tau_p_s: 1.0, tau_q_s: 1.0 }
    - { slave_id: 203, p_nom_kw: 15, s_nom_kva: 15, tau_p_s: 1.0, tau_q_s: 1.0 }
    - { slave_id: 204, p_nom_kw: 15, s_nom_kva: 15, tau_p_s: 1.0, tau_q_s: 1.0 }
    - { slave_id: 205, p_nom_kw: 15, s_nom_kva: 15, tau_p_s: 1.0, tau_q_s: 1.0 }
    - { slave_id: 206, p_nom_kw: 15, s_nom_kva: 15, tau_p_s: 1.0, tau_q_s: 1.0 }
    - { slave_id: 207, p_nom_kw: 35, s_nom_kva: 35, tau_p_s: 1.0, tau_q_s: 1.0 }
    - { slave_id: 208, p_nom_kw: 35, s_nom_kva: 35, tau_p_s: 1.0, tau_q_s: 1.0 }
    - { slave_id: 209, p_nom_kw: 50, s_nom_kva: 50, tau_p_s: 1.0, tau_q_s: 1.0 }
