# =============================================================================
# ETAPA 2 — OPENLOOP: Teste das rotinas de controle (cenário fixo)
# =============================================================================
# Objetivo: validar que o controlador calcula e distribui setpoints corretamente
#           em cenário estável, sem perturbações externas.
#
# O que acontece neste modo:
#   - Simulação física ATIVA (Thévenin, ZIP, dinâmica de 1ª ordem)
#   - Carga e irradiância FIXAS (valores load_p_kw / load_q_kvar / u_default)
#   - Perfis CSV: IGNORADOS
#   - Eventos (events.json): IGNORADOS
#
# Cenário de referência:
#   Carga: 200 kW + j50 kVAr
#   Geração máxima disponível: 455 kW (u=1.0, todos os inversores a 100%)
#   Com controlador a 0%: P_PCC ≈ +200 kW (importação), tensão ligeiramente < 380 V
#   Com controlador a 44%: P_PCC ≈ 0 kW (injeção zero), tensão ≈ 380 V
#   Com controlador a 100%: P_PCC ≈ -255 kW (exportação), tensão > 380 V
#
# PRÉ-REQUISITO: Etapa 1 aprovada.
# COMO AVANÇAR: cp configs/config_etapa3_full.yaml configs/config.yaml
# =============================================================================

simulation:
  mode: "openloop"
  tick_s: 0.01
  control_cycle_s: 2.0
  v_ll_v: 380.0
  enable_logs: true

  # Cenário fixo — valores usados diretamente (CSV ignorado)
  u_default: 1.0
  load_p_kw: 200.0
  load_q_kvar: 50.0

  # Perfis CSV presentes mas IGNORADOS neste modo.
  # Mantidos para facilitar transição para mode: full.
  u_profile_csv: "profiles/u_profile.csv"
  load_profile_csv: "profiles/load_profile.csv"

  # Modelo de carga ZIP (ANEEL)
  zip_p_Z: 0.50
  zip_p_I: 0.00
  zip_p_P: 0.50
  zip_q_Z: 0.00
  zip_q_I: 0.00
  zip_q_P: 1.00

  # Equivalente de Thévenin (Scc=10 MVA, X/R=5)
  thevenin_vth_ll_v: 380.0
  thevenin_r_ohm: 0.00283
  thevenin_x_ohm: 0.01416

  # Medição MT
  v_mt_ll_v: 13800.0
  rtp: 120.0
  rtc: 200.0

  # Eventos (IGNORADOS neste modo)
  events_file: "configs/events.json"
  events_poll_s: 2.0

  # Loopback (não usado nesta etapa)
  loopback_pf: 0.92
  loopback_v_mt_ln_v: 66.4
  loopback_i_mt_a: 2.5

com1:
  serial:
    device: "/dev/ttySC0"
    baudrate: 9600
    parity: "N"
    stopbits: 1
    bytesize: 8
    timeout_s: 0.2

  meter:
    slave_id: 100
    base_address: 0x0099
    quantity_u16: 28

  inverters:
    - { slave_id: 101, p_nom_kw: 60, s_nom_kva: 60, tau_p_s: 1.0, tau_q_s: 1.0 }
    - { slave_id: 102, p_nom_kw: 60, s_nom_kva: 60, tau_p_s: 1.0, tau_q_s: 1.0 }
    - { slave_id: 103, p_nom_kw: 35, s_nom_kva: 35, tau_p_s: 1.0, tau_q_s: 1.0 }
    - { slave_id: 104, p_nom_kw: 15, s_nom_kva: 15, tau_p_s: 1.0, tau_q_s: 1.0 }
    - { slave_id: 105, p_nom_kw: 15, s_nom_kva: 15, tau_p_s: 1.0, tau_q_s: 1.0 }
    - { slave_id: 106, p_nom_kw: 15, s_nom_kva: 15, tau_p_s: 1.0, tau_q_s: 1.0 }
    - { slave_id: 107, p_nom_kw: 15, s_nom_kva: 15, tau_p_s: 1.0, tau_q_s: 1.0 }
    - { slave_id: 108, p_nom_kw: 15, s_nom_kva: 15, tau_p_s: 1.0, tau_q_s: 1.0 }
    - { slave_id: 109, p_nom_kw: 15, s_nom_kva: 15, tau_p_s: 1.0, tau_q_s: 1.0 }

com2:
  serial:
    device: "/dev/ttySC1"
