# =============================================================================
# ETAPA 1 — LOOPBACK: Teste de comunicação Modbus RTU
# =============================================================================
# Objetivo: validar toda a cadeia de comunicação ANTES de ligar a simulação.
#
# O que acontece neste modo:
#   - Medidor (slave 100): responde FC03 com valores FIXOS e conhecidos
#   - Inversores (slaves 101-109, 201-209): aceitam FC16 e logam setpoints
#   - Simulação física: DESLIGADA (sem Thévenin, ZIP, dinâmica)
#
# VALORES ESPERADOS NOS REGISTRADORES DO MEDIDOR (para conferência no PLC):
#   Registrador | Grandeza   | Valor sec | Codificação  | U16 esperado
#   0x0099      | PF fase A  | 0.92      | val × 16384  | 15073
#   0x009A      | PF fase B  | 0.92      | val × 16384  | 15073
#   0x009B      | PF fase C  | 0.92      | val × 16384  | 15073
#   0x00A0      | Ia         | 2.5 A     | val × 256    | 640
#   0x00A1      | Ib         | 2.5 A     | val × 256    | 640
#   0x00A2      | Ic         | 2.5 A     | val × 256    | 640
#   0x00A4      | Ua (fn)    | 66.4 V    | val × 128    | 8499
#   0x00A5      | Ub (fn)    | 66.4 V    | val × 128    | 8499
#   0x00A6      | Uc (fn)    | 66.4 V    | val × 128    | 8499
#
# MUDANÇAS EM RELAÇÃO À VERSÃO LINUX:
#   - tick_s: 0.05  (era 0.01 — mínimo seguro no Windows)
#   - device COM1: "COM7"  (era /dev/ttySC0)
#   - device COM2: "COM6"  (era /dev/ttySC1)
#   Ajuste as portas COM conforme o Gerenciador de Dispositivos.
#
# COMO AVANÇAR:
#   copy configs\config_etapa2_openloop.yaml configs\config.yaml
# =============================================================================

simulation:
  mode: "loopback"
  tick_s: 0.05                   # Windows: mínimo seguro (scheduler ~15 ms)
  control_cycle_s: 2.0
  v_ll_v: 380.0
  enable_logs: true

  loopback_pf: 0.92
  loopback_v_mt_ln_v: 66.4
  loopback_i_mt_a: 2.5

  u_default: 1.0
  load_p_kw: 200.0
  load_q_kvar: 50.0
  zip_p_Z: 0.50
  zip_p_I: 0.00
  zip_p_P: 0.50
  zip_q_Z: 0.00
  zip_q_I: 0.00
  zip_q_P: 1.00
  thevenin_vth_ll_v: 380.0
  thevenin_r_ohm: 0.00283
  thevenin_x_ohm: 0.01416
  v_mt_ll_v: 13800.0
  rtp: 120.0
  rtc: 200.0
  events_file: "configs/events.json"
  events_poll_s: 2.0

com1:
  serial:
    device: "COM7"               # Windows: ajuste conforme Gerenciador de Dispositivos
    baudrate: 9600
    parity: "N"
    stopbits: 1
    bytesize: 8
    timeout_s: 0.2

  meter:
    slave_id: 100
    base_address: 0x0099
    quantity_u16: 28

  inverters:
    - { slave_id: 101, p_nom_kw: 60, s_nom_kva: 60, tau_p_s: 1.0, tau_q_s: 1.0 }
    - { slave_id: 102, p_nom_kw: 60, s_nom_kva: 60, tau_p_s: 1.0, tau_q_s: 1.0 }
    - { slave_id: 103, p_nom_kw: 35, s_nom_kva: 35, tau_p_s: 1.0, tau_q_s: 1.0 }
    - { slave_id: 104, p_nom_kw: 15, s_nom_kva: 15, tau_p_s: 1.0, tau_q_s: 1.0 }
    - { slave_id: 105, p_nom_kw: 15, s_nom_kva: 15, tau_p_s: 1.0, tau_q_s: 1.0 }
    - { slave_id: 106, p_nom_kw: 15, s_nom_kva: 15, tau_p_s: 1.0, tau_q_s: 1.0 }
    - { slave_id: 107, p_nom_kw: 15, s_nom_kva: 15, tau_p_s: 1.0, tau_q_s: 1.0 }
    - { slave_id: 108, p_nom_kw: 15, s_nom_kva: 15, tau_p_s: 1.0, tau_q_s: 1.0 }
    - { slave_id: 109, p_nom_kw: 15, s_nom_kva: 15, tau_p_s: 1.0, tau_q_s: 1.0 }

com2:
  serial:
    device: "COM6"               # Windows: ajuste conforme Gerenciador de Dispositivos
    baudrate: 9600
    parity: "N"
    stopbits: 1
    bytesize: 8
    timeout_s: 0.2

  inverters:
    - { slave_id: 201, p_nom_kw: 15, s_nom_kva: 15, tau_p_s: 1.0, tau_q_s: 1.0 }
    - { slave_id: 202, p_nom_kw: 15, s_nom_kva: 15, tau_p_s: 1.0, tau_q_s: 1.0 }
    - { slave_id: 203, p_nom_kw: 15, s_nom_kva: 15, tau_p_s: 1.0, tau_q_s: 1.0 }
    - { slave_id: 204, p_nom_kw: 15, s_nom_kva: 15, tau_p_s: 1.0, tau_q_s: 1.0 }
    - { slave_id: 205, p_nom_kw: 15, s_nom_kva: 15, tau_p_s: 1.0, tau_q_s: 1.0 }
    - { slave_id: 206, p_nom_kw: 15, s_nom_kva: 15, tau_p_s: 1.0, tau_q_s: 1.0 }
    - { slave_id: 207, p_nom_kw: 35, s_nom_kva: 35, tau_p_s: 1.0, tau_q_s: 1.0 }
    - { slave_id: 208, p_nom_kw: 35, s_nom_kva: 35, tau_p_s: 1.0, tau_q_s: 1.0 }
    - { slave_id: 209, p_nom_kw: 50, s_nom_kva: 50, tau_p_s: 1.0, tau_q_s: 1.0 }
