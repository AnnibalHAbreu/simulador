simulation:
  tick_s: 2.0
  v_ll_v: 380.0
  enable_logs: true

  # Perfis opcionais
  u_profile_csv: "profiles/u_profile.csv"
  load_profile_csv: "profiles/load_profile.csv"

  # Defaults (usados se não houver CSV)
  u_default: 1.0
  load_p_kw: 50.0
  load_q_kvar: 0.0

com1:
  serial:
    device: "/dev/ttySC0"
    baudrate: 9600
    parity: "N"
    stopbits: 1
    bytesize: 8
    timeout_s: 0.2

  meter:
    slave_id: 100
    base_address: 0x0099
    quantity_u16: 28

  inverters:
    - { slave_id: 101, p_nom_kw: 60, s_nom_kva: 60, alpha: 0.2, beta: 0.2 }
    - { slave_id: 102, p_nom_kw: 60, s_nom_kva: 60, alpha: 0.2, beta: 0.2 }
    - { slave_id: 103, p_nom_kw: 35, s_nom_kva: 35, alpha: 0.2, beta: 0.2 }
    - { slave_id: 104, p_nom_kw: 15, s_nom_kva: 15, alpha: 0.2, beta: 0.2 }
    - { slave_id: 105, p_nom_kw: 15, s_nom_kva: 15, alpha: 0.2, beta: 0.2 }
    - { slave_id: 106, p_nom_kw: 15, s_nom_kva: 15, alpha: 0.2, beta: 0.2 }
    - { slave_id: 107, p_nom_kw: 15, s_nom_kva: 15, alpha: 0.2, beta: 0.2 }
    - { slave_id: 108, p_nom_kw: 15, s_nom_kva: 15, alpha: 0.2, beta: 0.2 }
    - { slave_id: 109, p_nom_kw: 15, s_nom_kva: 15, alpha: 0.2, beta: 0.2 }

com2:
  serial:
    device: "/dev/ttySC1"
    baudrate: 9600
    parity: "N"
    stopbits: 1
    bytesize: 8
    timeout_s: 0.2

  inverters:
    - { slave_id: 201, p_nom_kw: 15, s_nom_kva: 15, alpha: 0.2, beta: 0.2 }
    - { slave_id: 202, p_nom_kw: 15, s_nom_kva: 15, alpha: 0.2, beta: 0.2 }
    - { slave_id: 203, p_nom_kw: 15, s_nom_kva: 15, alpha: 0.2, beta: 0.2 }
    - { slave_id: 204, p_nom_kw: 15, s_nom_kva: 15, alpha: 0.2, beta: 0.2 }
    - { slave_id: 205, p_nom_kw: 15, s_nom_kva: 15, alpha: 0.2, beta: 0.2 }
    - { slave_id: 206, p_nom_kw: 15, s_nom_kva: 15, alpha: 0.2, beta: 0.2 }
    - { slave_id: 207, p_nom_kw: 35, s_nom_kva: 35, alpha: 0.2, beta: 0.2 }
    - { slave_id: 208, p_nom_kw: 35, s_nom_kva: 35, alpha: 0.2, beta: 0.2 }
    - { slave_id: 209, p_nom_kw: 50, s_nom_kva: 50, alpha: 0.2, beta: 0.2 }